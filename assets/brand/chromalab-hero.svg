    <circle cx="116" cy="32" r="7" fill="#07111F" stroke="#F7C948" stroke-width="3"/>
  </g>
  <text x="72" y="256" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="60" font-weight="780" fill="#FFFFFF">ChromaLab</text>
  <text x="76" y="300" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="520" fill="#D7E7F7">Offline chromatogram analysis with local AI assistance</text>
  <text x="76" y="344" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="520" fill="#9FB6CB">Photo or screenshot -> graph evidence -> calibrated trace -> peak report</text>
