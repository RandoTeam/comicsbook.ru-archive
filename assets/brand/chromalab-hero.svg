<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">ChromaLab repository hero</title>
  <desc id="desc">A public repository hero showing the ChromaLab brand, an auditable chromatogram pipeline, and local AI assistance.</desc>
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.62" stop-color="#10233D"/>
      <stop offset="1" stop-color="#123A4D"/>
    </linearGradient>
    <linearGradient id="line" x1="478" y1="278" x2="1008" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#62E0FF"/>
      <stop offset="0.48" stop-color="#23D3A6"/>
      <stop offset="1" stop-color="#F7C948"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" rx="34" fill="url(#heroBg)"/>
  <g opacity="0.14">
    <path d="M430 70H1080M430 130H1080M430 190H1080M430 250H1080M430 310H1080" stroke="#D7E7F7" stroke-width="2"/>
    <path d="M500 50V334M590 50V334M680 50V334M770 50V334M860 50V334M950 50V334M1040 50V334" stroke="#D7E7F7" stroke-width="2"/>
